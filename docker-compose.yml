# ─────────────────────────────────────────────────────────────────

# This is your first real DevOps challenge in this project.
#
# Services to define: nginx, frontend, backend, postgres, redis
#
# Things to figure out:
#   - How do containers reference each other by service name?
#   - How do you make backend wait for postgres to be healthy?
#   - What named volumes do postgres and redis need?
#   - What port does each service expose to the host?
#   - How do you pass environment variables from .env into the backend?
#

services:
  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      frontend:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=fleet_user
      - POSTGRES_PASSWORD=fleet_pass
      - POSTGRES_DB=fleet_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet_user -d fleet_db"] 
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: